name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check contracts
        working-directory: packages/contracts
        run: bun run tsc --noEmit

      - name: Type check API
        working-directory: packages/api
        run: bun run tsc --noEmit

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: typecheck

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI binary
        run: bun run --filter cli build

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: subs
          path: packages/cli/subs
